<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 512px; height: 512px; overflow: hidden;
    background: transparent;
    display: flex; align-items: center; justify-content: center;
  }

  .icon {
    width: 440px; height: 440px;
    border-radius: 96px;
    background: linear-gradient(145deg, #111827 0%, #0a0f1e 100%);
    border: 1.5px solid #1e3a5f;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(37,99,235,0.15),
      0 0 60px rgba(37,99,235,0.12),
      inset 0 1px 0 rgba(255,255,255,0.06);
  }

  /* subtle inner radial glow */
  .icon::before {
    content: '';
    position: absolute;
    width: 280px; height: 280px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(37,99,235,0.10) 0%, transparent 70%);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
  }

  svg { position: relative; z-index: 1; }
</style>
</head>
<body>
  <div class="icon">
    <svg width="260" height="260" viewBox="0 0 260 260" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Ghost body -->
      <path d="
        M130 30
        C89.6 30 57 62.6 57 103
        L57 210
        L80 192
        L103 210
        L130 192
        L157 210
        L180 192
        L203 210
        L203 103
        C203 62.6 170.4 30 130 30 Z
      " fill="white" />

      <!-- Subtle inner shadow at top to give depth -->
      <path d="
        M130 30
        C89.6 30 57 62.6 57 103
        L57 130
        C57 89.6 89.6 57 130 57
        C170.4 57 203 89.6 203 130
        L203 103
        C203 62.6 170.4 30 130 30 Z
      " fill="rgba(0,0,0,0.06)" />

      <!-- Left eye -->
      <circle cx="103" cy="112" r="16" fill="#1d4ed8"/>
      <circle cx="103" cy="112" r="10" fill="#3b82f6"/>
      <circle cx="108" cy="107" r="4" fill="rgba(255,255,255,0.5)"/>

      <!-- Right eye -->
      <circle cx="157" cy="112" r="16" fill="#1d4ed8"/>
      <circle cx="157" cy="112" r="10" fill="#3b82f6"/>
      <circle cx="162" cy="107" r="4" fill="rgba(255,255,255,0.5)"/>
    </svg>
  </div>
</body>
</html>
